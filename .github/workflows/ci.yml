name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - api-with-prisma
          - api-with-drizzle
          - api-with-typeorm
          - api-with-knex
          - api-with-sequelize
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: ${{ matrix.project }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ${{ matrix.project }}

      - name: Build (TypeScript check)
        run: pnpm build
        working-directory: ${{ matrix.project }}
